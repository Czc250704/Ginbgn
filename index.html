<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>抽号器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #e9ecef;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 540px;
            width: 100%;
            background: #ffffff;
            border: 1px solid #ced4da;
            padding: 30px 28px 40px;
        }

        h1 {
            text-align: center;
            font-weight: 500;
            font-size: 2rem;
            letter-spacing: 1px;
            color: #2c3e4e;
            margin-bottom: 12px;
        }

        .sub {
            text-align: center;
            font-size: 0.85rem;
            color: #6c7a89;
            margin-bottom: 32px;
            padding-bottom: 8px;
            border-bottom: 1px solid #dee2e6;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        .range-panel {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 18px 20px;
            margin-bottom: 32px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .input-group {
            flex: 1;
            min-width: 110px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #4a5b6e;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 8px;
            border: 1px solid #ced4da;
            background: #ffffff;
            font-size: 1rem;
            font-family: monospace;
            color: #1e2a36;
            outline: none;
        }

        .input-group input:focus {
            border-color: #8c9aa8;
            background: #fff;
        }

        .result-area {
            background: #f1f3f5;
            border: 1px solid #dee2e6;
            padding: 28px 16px;
            text-align: center;
            margin-bottom: 32px;
        }

        .result-label {
            font-size: 0.85rem;
            color: #5c6f87;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .result-number {
            font-size: 4.2rem;
            font-weight: 500;
            font-family: 'Courier New', 'SF Mono', monospace;
            color: #2c3e4e;
            line-height: 1.2;
            word-break: break-word;
        }

        .btn-draw {
            width: 100%;
            background: #d4e0e9;
            border: 1px solid #adb5bd;
            padding: 14px 12px;
            font-size: 1.3rem;
            font-weight: 500;
            color: #2c3e4e;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: inherit;
            letter-spacing: 1px;
        }

        .btn-draw:hover {
            background: #cbd7e2;
            border-color: #8c9aa8;
        }

        .btn-draw:active {
            background: #b9c7d4;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>抽号器</h1>
    <div style="text-align: center;">
        <div class="sub">数字范围抽取</div>
    </div>

    <div class="range-panel">
        <div class="input-group">
            <label>最小值</label>
            <input type="number" id="minValue" value="1" step="1">
        </div>
        <div class="input-group">
            <label>最大值</label>
            <input type="number" id="maxValue" value="100" step="1">
        </div>
    </div>

    <div class="result-area">
        <div class="result-label">本次抽中号码</div>
        <div class="result-number" id="resultDisplay">—</div>
    </div>

    <button class="btn-draw" id="drawBtn">开始抽号</button>
</div>

<script>
    (function() {
        const minInput = document.getElementById('minValue');
        const maxInput = document.getElementById('maxValue');
        const drawBtn = document.getElementById('drawBtn');
        const resultDisplay = document.getElementById('resultDisplay');

        function getValidRange() {
            let min = parseInt(minInput.value, 10);
            let max = parseInt(maxInput.value, 10);

            if (isNaN(min)) min = 1;
            if (isNaN(max)) max = 100;

            if (min > max) {
                const temp = min;
                min = max;
                max = temp;
                minInput.value = min;
                maxInput.value = max;
            }

            if (min === max) {
                return { min, max, valid: true };
            }

            return { min, max, valid: true };
        }

        function drawRandomNumber() {
            const { min, max, valid } = getValidRange();
            if (!valid) {
                resultDisplay.textContent = '?';
                return;
            }

            if (min === max) {
                resultDisplay.textContent = min;
                return;
            }

            const range = max - min + 1;
            const randomValue = Math.floor(Math.random() * range) + min;
            resultDisplay.textContent = randomValue;
        }

        drawBtn.addEventListener('click', function() {
            drawRandomNumber();
        });

        minInput.addEventListener('change', function() {
            let min = parseInt(minInput.value, 10);
            let max = parseInt(maxInput.value, 10);
            if (isNaN(min)) min = 1;
            if (isNaN(max)) max = 100;
            if (min > max) {
                maxInput.value = min;
            }
            if (minInput.value !== String(min)) minInput.value = min;
            drawRandomNumber();
        });

        maxInput.addEventListener('change', function() {
            let min = parseInt(minInput.value, 10);
            let max = parseInt(maxInput.value, 10);
            if (isNaN(min)) min = 1;
            if (isNaN(max)) max = 100;
            if (max < min) {
                minInput.value = max;
            }
            if (maxInput.value !== String(max)) maxInput.value = max;
            drawRandomNumber();
        });

        drawRandomNumber();
    })();
</script>
</body>
</html>
