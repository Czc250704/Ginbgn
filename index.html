<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>抽号器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免抽号时拖动文字但是不影响输入框 */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1f2e 0%, #0e121f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 1.5rem;
        }

        /* 主界面大卡片 */
        .draw-container {
            max-width: 680px;
            width: 100%;
            background: rgba(22, 28, 46, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            padding: 1.8rem 2rem 2.2rem;
            transition: all 0.2s ease;
        }

        /* 标题 */
        .title {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .title h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #E6F0FF, #B2C9FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .title p {
            font-size: 0.85rem;
            color: #8e9bbe;
            margin-top: 0.3rem;
        }

        /* 抽号展示区 (大数字) */
        .number-stage {
            background: radial-gradient(circle at 30% 20%, #0b0f1a, #05070f);
            border-radius: 2.5rem;
            padding: 1.8rem 1rem;
            margin-bottom: 2rem;
            box-shadow: inset 0 8px 12px rgba(0,0,0,0.4), 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(80, 120, 255, 0.2);
            transition: all 0.2s;
        }
        .draw-number {
            font-size: 6rem;
            font-weight: 800;
            text-align: center;
            font-family: 'Monaco', 'Courier New', 'JetBrains Mono', monospace;
            letter-spacing: 4px;
            color: #F2F6FF;
            text-shadow: 0 0 8px #3e6aff, 0 4px 12px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #ffffff, #c0d4ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            transition: transform 0.2s cubic-bezier(0.2, 1.2, 0.4, 1);
        }
        .animate-shake {
            animation: numberPop 0.22s ease-in-out;
        }
        @keyframes numberPop {
            0% { transform: scale(0.9); opacity: 0.7; text-shadow: 0 0 0px; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .remain-info {
            text-align: center;
            margin-top: 0.8rem;
            font-size: 0.9rem;
            background: rgba(30, 40, 60, 0.6);
            display: inline-block;
            width: auto;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #bfd9ff;
            font-weight: 500;
            backdrop-filter: blur(2px);
        }

        /* 控制器 */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: space-between;
            align-items: flex-end;
        }
        .range-group {
            display: flex;
            gap: 0.8rem;
            background: #0f1322;
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            align-items: center;
            flex-wrap: wrap;
            flex: 2;
            min-width: 200px;
        }
        .range-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #1a1f30;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
        }
        .range-item label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #aab9e6;
        }
        .range-item input {
            width: 75px;
            background: #0a0e18;
            border: 1px solid #2d3755;
            padding: 0.45rem 0.5rem;
            border-radius: 1.5rem;
            color: white;
            font-weight: 600;
            text-align: center;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .range-item input:focus {
            border-color: #4c7eff;
            box-shadow: 0 0 0 2px rgba(76, 126, 255, 0.3);
        }
        .apply-range-btn {
            background: #2c3550;
            border: none;
            color: white;
            padding: 0.5rem 1.1rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .apply-range-btn:hover {
            background: #3e4a70;
            transform: scale(0.97);
        }
        .mode-switch {
            background: #0f1322;
            padding: 0.5rem 1.2rem;
            border-radius: 2.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .mode-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: #b7c3f0;
            transition: 0.2s;
        }
        .mode-option input {
            accent-color: #4c7eff;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .mode-option.active-mode {
            color: white;
        }

        /* 抽号按钮 */
        .draw-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 1.8rem;
        }
        .draw-btn {
            background: linear-gradient(95deg, #3b5eff, #6f45e0);
            border: none;
            padding: 1rem 2.6rem;
            font-size: 1.6rem;
            font-weight: 800;
            border-radius: 4rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 20px -5px rgba(59, 94, 255, 0.4);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .draw-btn:active {
            transform: scale(0.96);
            box-shadow: 0 5px 12px rgba(59, 94, 255, 0.3);
        }
        .draw-btn.disabled-btn, .draw-btn:disabled {
            opacity: 0.55;
            transform: scale(0.98);
            cursor: not-allowed;
            filter: grayscale(0.1);
            box-shadow: none;
        }
        .reset-btn {
            background: #252d46;
            box-shadow: none;
            padding: 0.7rem 1.8rem;
            font-size: 1rem;
            font-weight: 600;
        }
        .reset-btn:hover {
            background: #35406a;
        }

    </style>
</head>
<body>

<div class="draw-container">
    <div class="title">
        <h1>抽号器</h1>
    </div>

    <!-- 抽号面板 -->
    <div class="number-stage">
        <div class="draw-number" id="displayNumber">--</div>
        <div style="text-align: center; margin-top: 0.4rem;">
            <div class="remain-info" id="remainInfo">⚡ 普通模式</div>
        </div>
    </div>

    <!-- 控制区 -->
    <div class="control-panel">
        <div class="range-group">
            <div class="range-item">
                <label>从</label>
                <input type="number" id="minVal" value="1" step="1" min="0">
            </div>
            <div class="range-item">
                <label>至</label>
                <input type="number" id="maxVal" value="100" step="1">
            </div>
            <button class="apply-range-btn" id="applyRangeBtn">设定范围</button>
        </div>
        <div class="mode-switch" id="modeSwitchArea">
            <label class="mode-option" id="normalModeLabel">
                <input type="radio" name="drawMode" value="normal" checked> 普通模式 (可重复)
            </label>
            <label class="mode-option" id="uniqueModeLabel">
                <input type="radio" name="drawMode" value="unique"> 唯一模式 (不重复)
            </label>
        </div>
    </div>

    <!-- 抽号与重置按钮组 -->
    <div class="draw-btn-wrapper" style="gap: 1rem; flex-wrap: wrap;">
        <button class="draw-btn" id="drawBtn">抽号</button>
        <button class="draw-btn reset-btn" id="resetSystemBtn">重置</button>
    </div>
</div>
<div id="toastMessage" class="toast-msg" style="opacity:0; visibility: hidden;"></div>

<script>
    // DOM 元素
    const displayNumberDiv = document.getElementById('displayNumber');
    const minInput = document.getElementById('minVal');
    const maxInput = document.getElementById('maxVal');
    const applyRangeBtn = document.getElementById('applyRangeBtn');
    const drawBtn = document.getElementById('drawBtn');
    const resetSystemBtn = document.getElementById('resetSystemBtn');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const historyListDiv = document.getElementById('historyList');
    const remainInfoSpan = document.getElementById('remainInfo');
    
    // 模式 radio
    const normalRadio = document.querySelector('input[value="normal"]');
    const uniqueRadio = document.querySelector('input[value="unique"]');

    // 全局状态 
    let currentMin = 1;          // 当前生效的最小值
    let currentMax = 100;        // 当前生效的最大值
    let drawMode = 'normal';     // 'normal' 或 'unique'
    
    // 唯一模式专用：剩余号码池
    let remainingNumbers = [];
    
    // 历史记录存储 { number, timestamp }
    let historyRecords = [];
    
    // 动画相关
    let animationInterval = null;
    let isAnimating = false;
    let animationTimeout = null;
    
    // 辅助函数: 显示toast提示
    let toastTimeout = null;
    function showToast(message, duration = 2000) {
        const toast = document.getElementById('toastMessage');
        if (toastTimeout) clearTimeout(toastTimeout);
        toast.innerText = message;
        toast.style.visibility = 'visible';
        toast.style.opacity = '1';
        toastTimeout = setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.visibility = 'hidden';
        }, duration);
    }
    
    // 检查并修正范围有效性
    function validateRange(min, max) {
        let newMin = parseInt(min, 10);
        let newMax = parseInt(max, 10);
        if (isNaN(newMin)) newMin = 1;
        if (isNaN(newMax)) newMax = 100;
        if (newMin > newMax) {
            [newMin, newMax] = [newMax, newMin];
        }
        if (newMin === newMax) {
            // 允许单数字范围
        }
        return { min: newMin, max: newMax };
    }
    
    // 根据当前模式与范围构建剩余池
    function rebuildRemainingPool() {
        if (drawMode === 'unique') {
            const totalCount = currentMax - currentMin + 1;
            if (totalCount <= 0) {
                remainingNumbers = [];
                return;
            }
            const arr = [];
            for (let i = currentMin; i <= currentMax; i++) {
                arr.push(i);
            }
          
            remainingNumbers = arr;
            updateRemainDisplay();
        } else {
            // 普通模式不需要池
            updateRemainDisplay();
        }
    }
    
    // 更新剩余号码显示 (仅唯一模式有实际意义)
    function updateRemainDisplay() {
        if (drawMode === 'unique') {
            const count = remainingNumbers.length;
            const total = currentMax - currentMin + 1;
            if (total <= 0) {
                remainInfoSpan.innerHTML = `⚠️ 范围无效 | 剩余 0 / 0`;
                return;
            }
            remainInfoSpan.innerHTML = `🔒 唯一模式 · 剩余可抽 ${count} / ${total}`;
            if (count === 0) {
                remainInfoSpan.style.background = "#4a2a3a";
                remainInfoSpan.style.color = "#ffbaba";
            } else {
                remainInfoSpan.style.background = "rgba(30, 40, 60, 0.7)";
                remainInfoSpan.style.color = "#bfd9ff";
            }
        } else {
            remainInfoSpan.innerHTML = `🎲 普通模式 · 范围 ${currentMin} ~ ${currentMax}`;
        }
    }
    
    // 普通模式
    function getRandomNormal() {
        if (currentMin > currentMax) return currentMin;
        return Math.floor(Math.random() * (currentMax - currentMin + 1)) + currentMin;
    }
    
    // 唯一模式
    function drawUniqueNumber() {
        if (remainingNumbers.length === 0) return null;
        const randomIndex = Math.floor(Math.random() * remainingNumbers.length);
        const drawn = remainingNumbers[randomIndex];
        // 移除元素
        remainingNumbers.splice(randomIndex, 1);
        return drawn;
    }
    
    // 实际抽号 (不带动画) 
    function performDraw() {
        if (drawMode === 'normal') {
            return getRandomNormal();
        } else { // unique
            if (remainingNumbers.length === 0) {
                return null;
            }
            return drawUniqueNumber();
        }
    }
    
    // 刷新历史列表  UI
    function renderHistory() {
        historyListDiv.innerHTML = '';
        if (historyRecords.length === 0) {
            historyListDiv.innerHTML = '<div class="empty-history">📭 暂无抽号记录，点击抽号 📭</div>';
            return;
        }
        // 展示最新的在前面
        const reversed = [...historyRecords].reverse();
        reversed.forEach(record => {
            const badge = document.createElement('div');
            badge.className = 'history-badge';
            badge.innerText = `${record.number}`;
            // 可选标题    显示时间
            badge.title = record.time;
            historyListDiv.appendChild(badge);
        });
    }
    
        
    // 重置整个系统（重置池，根据模式重设）
    function fullSystemReset() {
        // 重建池 (唯一模式会构建完整池，普通模式忽略)
        if (drawMode === 'unique') {
            rebuildRemainingPool();
        }
        updateRemainDisplay();
        // 重置显示数字为默认占位符
        displayNumberDiv.innerText = '✨';
        setTimeout(() => {
            if (displayNumberDiv.innerText === '✨') displayNumberDiv.innerText = '--';
        }, 300);
        showToast("系统已重置，抽号池恢复初始", 1000);
        // 如果唯一模式池为空且范围有效则提示
        if (drawMode === 'unique' && remainingNumbers.length === 0 && currentMin <= currentMax) {
            showToast("当前范围内无可抽号码，请扩大范围或重置", 1800);
        }
    }
    
    // 应用新范围 (从输入框读取并验证)
    function applyNewRange() {
        if (isAnimating) {
            showToast("抽号动画中，请稍后再设定范围", 1000);
            return;
        }
        let rawMin = parseInt(minInput.value, 10);
        let rawMax = parseInt(maxInput.value, 10);
        const { min, max } = validateRange(rawMin, rawMax);
        currentMin = min;
        currentMax = max;
        // 同步输入框显示规范值
        minInput.value = currentMin;
        maxInput.value = currentMax;
        
        // 范围改变后，重置系统: 清空历史 + 重建唯一池
        historyRecords = [];
        renderHistory();
        if (drawMode === 'unique') {
            rebuildRemainingPool();  // 全新池
        }
        updateRemainDisplay();
        displayNumberDiv.innerText = '--';
        showToast(`范围已更新: ${currentMin} ~ ${currentMax}`, 1200);
        if (drawMode === 'unique' && remainingNumbers.length === 0 && currentMin <= currentMax) {
            showToast("注意：当前范围内无可抽号码，请检查范围", 1500);
        }
    }
    
    // 模式切换处理
    function setMode(mode) {
        if (mode === drawMode) return;
        if (isAnimating) {
            showToast("请等待抽号动画结束后切换模式", 1000);
            return false;
        }
        drawMode = mode;
        // 更新radio       UI
        if (mode === 'normal') {
            normalRadio.checked = true;
        } else {
            uniqueRadio.checked = true;
        }
        // 切换模式时，重置整个抽号状态
        historyRecords = [];
        renderHistory();
        if (drawMode === 'unique') {
            rebuildRemainingPool();
            updateRemainDisplay();
        } else {
            // 普通模式清空剩余池概念
            remainingNumbers = [];
            updateRemainDisplay();
        }
        displayNumberDiv.innerText = '--';
        showToast(`已切换至${mode === 'normal' ? '普通模式 (可重复)' : '唯一模式 (不重复)'}`, 1200);
        if (drawMode === 'unique' && remainingNumbers.length === 0 && currentMin <= currentMax) {
            showToast("当前范围无剩余号码，请扩大范围或重置", 1500);
        }
        return true;
    }
    
    // 停止动画并最终显示抽取结果
    function stopAnimationAndDraw() {
        if (!isAnimating) return;
        if (animationInterval) {
            clearInterval(animationInterval);
            animationInterval = null;
        }
        if (animationTimeout) {
            clearTimeout(animationTimeout);
            animationTimeout = null;
        }
        isAnimating = false;
        
        // 真正抽取号码
        let finalNumber = performDraw();
        
        if (finalNumber === null) {
            // 唯一模式无剩余号码
            displayNumberDiv.innerText = '❗';
            showToast("无剩余号码！请重置抽号或调整范围", 1800);
            // 恢复按钮
            drawBtn.disabled = false;
            drawBtn.classList.remove('disabled-btn');
            return;
        }
        
        // 显示结果，添加动画闪烁
        displayNumberDiv.innerText = finalNumber;
        displayNumberDiv.classList.add('animate-shake');
        setTimeout(() => displayNumberDiv.classList.remove('animate-shake'), 250);
        
        // 更新唯一模式下剩余数量显示
        if (drawMode === 'unique') {
            updateRemainDisplay();
            // 如果抽完后剩余0，提示
            if (remainingNumbers.length === 0) {
                showToast("🏆 恭喜！所有号码均已抽完！请重置系统继续", 2000);
            }
        }
        
        // 启用抽号按钮
        drawBtn.disabled = false;
        drawBtn.classList.remove('disabled-btn');
    }
    
    // 开始抽号动画（滚动）
    function startDrawAnimation() {
        if (isAnimating) {
            showToast("抽号进行中，请稍后...", 800);
            return;
        }
        
        // 前置检查：唯一模式下如果剩余池为空，不能抽号
        if (drawMode === 'unique' && remainingNumbers.length === 0) {
            showToast("❌ 没有可抽的号码了，请点击「重置抽号」或调整范围", 1800);
            return;
        }
        // 普通模式范围检查
        if (currentMin > currentMax) {
            showToast("范围无效，请修正最小最大值", 1200);
            return;
        }
        
        // 禁用抽号按钮防止连点
        drawBtn.disabled = true;
        drawBtn.classList.add('disabled-btn');
        isAnimating = true;
        
        // 随机闪烁数字的定时器 (快速更换显示)
        let frameCount = 0;
        const totalDuration = 500;  // 动画时长0.5秒
        const intervalTime = 60;
        const maxSteps = Math.ceil(totalDuration / intervalTime);
        
        animationInterval = setInterval(() => {
            // 临时随机数字（在范围内生成视觉效果）
            let tempNum;
            if (currentMin <= currentMax) {
                tempNum = Math.floor(Math.random() * (currentMax - currentMin + 1)) + currentMin;
            } else {
                tempNum = currentMin;
            }
            displayNumberDiv.innerText = tempNum;
            frameCount++;
            if (frameCount >= maxSteps) {
                // 停止动画并执行最终抽号
                if (animationInterval) clearInterval(animationInterval);
                animationInterval = null;
                stopAnimationAndDraw();
            }
        }, intervalTime);
        
        // 保险超时终止
        animationTimeout = setTimeout(() => {
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }
            if (isAnimating) {
                stopAnimationAndDraw();
            }
        }, totalDuration + 80);
    }
    
    // 事件绑定
    drawBtn.addEventListener('click', startDrawAnimation);
    resetSystemBtn.addEventListener('click', () => {
        if (isAnimating) {
            showToast("动画中稍后重置", 800);
            return;
        }
        fullSystemReset();
    });
    clearHistoryBtn.addEventListener('click', () => {
        if (isAnimating) {
            showToast("抽号动画中，请稍后再清空历史", 800);
            return;
        }
        resetHistoryOnly();
    });
    applyRangeBtn.addEventListener('click', () => {
        if (isAnimating) {
            showToast("动画中，请稍后设定范围", 800);
            return;
        }
        applyNewRange();
    });
    
    normalRadio.addEventListener('change', (e) => {
        if (e.target.checked) setMode('normal');
    });
    uniqueRadio.addEventListener('change', (e) => {
        if (e.target.checked) setMode('unique');
    });
    
    // 初始化系统
    function init() {
        currentMin = 1; currentMax = 100;
        minInput.value = 1; maxInput.value = 100;
        drawMode = 'normal';
        normalRadio.checked = true;
        historyRecords = [];
        renderHistory();
        rebuildRemainingPool(); // 普通模式下无实际影响，但函数安全
        updateRemainDisplay();
        displayNumberDiv.innerText = '--';
    }
    init();
</script>
</body>
</html>
